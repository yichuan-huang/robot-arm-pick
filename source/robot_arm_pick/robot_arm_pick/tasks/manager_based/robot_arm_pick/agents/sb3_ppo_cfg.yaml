# Reference: https://github.com/DLR-RM/rl-baselines3-zoo/blob/master/hyperparams/ppo.yml#L32
seed: 42

# Training timesteps
n_timesteps: !!float 2e6
policy: 'MlpPolicy'

# Rollout settings
n_steps: 2048
batch_size: 64
gae_lambda: 0.95
gamma: 0.99

# Training optimization - balanced for good learning
n_epochs: 10
ent_coef: 0.005  # Small exploration bonus
learning_rate: !!float 4e-4  # Moderate learning rate increase
clip_range: !!float 0.2

# Neural network architecture - moderately larger
policy_kwargs:
  net_arch: [384, 384, 192]  # Moderately larger network
  squash_output: false

# Value function coefficient
vf_coef: 0.5

# Gradient clipping
max_grad_norm: 0.5

# Device
device: "cuda:0"

# Additional advanced settings for manipulation tasks
# normalize_input: true  # Uncomment if input normalization is needed
# normalize_value: false
# clip_obs: 10.0