# Reference: https://github.com/DLR-RM/rl-baselines3-zoo/blob/master/hyperparams/ppo.yml#L32
seed: 42

# Training timesteps
n_timesteps: !!float 2e6
policy: 'MlpPolicy'

# Rollout settings
n_steps: 2048
batch_size: 256
gae_lambda: 0.95
gamma: 0.99

# Training optimization
n_epochs: 10
ent_coef: 0.005
learning_rate: !!float 4e-4
clip_range: !!float 0.2

# Neural network architecture
policy_kwargs:
  net_arch: [384, 384, 192]
  squash_output: false

# Value function coefficient
vf_coef: 0.5

# Gradient clipping
max_grad_norm: 0.5

# Device
device: "cuda:0"

# Advanced settings for manipulation
normalize_input: true
clip_obs: 10.0
